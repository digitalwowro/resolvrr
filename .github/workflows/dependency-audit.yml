name: Dependency audit

on:
  pull_request:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  push:
    branches:
      - main
    paths:
      - package.json
      - package-lock.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Audit dependencies
        run: npm audit --audit-level=moderate
